name: gp_app
description: "Offline-first garage management app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  tflite_flutter: ^0.12.1
  image: ^4.3.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  camerawesome: ^2.0.0
  path_provider: ^2.1.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  assets:
    - assets/plate_detection.tflite
    - assets/plate_ocr.tflite
  uses-material-design: true

# App launcher icon. Put your icon (square PNG, ideally 1024x1024) at the
# image_path below, then run:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
